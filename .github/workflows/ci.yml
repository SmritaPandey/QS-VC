name: QS-VC CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-test-build:
    name: Lint → Test → Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Run tests
        run: npx vitest run --reporter=verbose

      - name: Build all services
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-test-build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build SFU image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/sfu/Dockerfile
          push: false
          tags: qsvc-sfu:latest

      - name: Build Signaling image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/signaling/Dockerfile
          push: false
          tags: qsvc-signaling:latest

      - name: Build Auth image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/auth/Dockerfile
          push: false
          tags: qsvc-auth:latest

      - name: Build Meeting image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/meeting/Dockerfile
          push: false
          tags: qsvc-meeting:latest

      - name: Build Recording image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/recording/Dockerfile
          push: false
          tags: qsvc-recording:latest

      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/web/Dockerfile
          push: false
          tags: qsvc-web:latest
