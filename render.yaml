# render.yaml — Render.com Blueprint for QS-VC
# Deploy: Connect this repo on https://dashboard.render.com/blueprints
# Docs: https://docs.render.com/infrastructure-as-code

databases:
  - name: qsvc-db
    plan: free
    databaseName: qsvc
    user: qsvc
    ipAllowList: []  # Allow all (required for free tier)

services:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # AUTH SERVICE
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  - type: web
    name: qsvc-auth
    runtime: docker
    plan: free
    dockerfilePath: ./services/auth/Dockerfile
    dockerContext: ./services/auth
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: qsvc-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: "24h"
      - key: TURN_SECRET
        value: demo-turn-secret
      - key: TURN_SERVERS
        value: "stun:stun.l.google.com:19302"
      - key: CORS_ORIGINS
        sync: false  # Set manually after Vercel deploy

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # SIGNALING SERVICE
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  - type: web
    name: qsvc-signaling
    runtime: docker
    plan: free
    dockerfilePath: ./services/signaling/Dockerfile
    dockerContext: ./services/signaling
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false  # Must match auth service
      - key: CORS_ORIGINS
        sync: false  # Set manually after Vercel deploy

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # MEETING SERVICE
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  - type: web
    name: qsvc-meeting
    runtime: docker
    plan: free
    dockerfilePath: ./services/meeting/Dockerfile
    dockerContext: ./services/meeting
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: qsvc-db
          property: connectionString
      - key: JWT_SECRET
        sync: false  # Must match auth service
      - key: WEB_URL
        sync: false  # Set to Vercel URL
      - key: CORS_ORIGINS
        sync: false  # Set manually after Vercel deploy
